<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LM Arena Visualization</title>
    <meta
      name="description"
      content="Interactive visual analytics dashboard for LMArena leaderboard snapshots."
    />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%2318191d'/%3E%3Cpath d='M14 44h36M18 38l8-12 8 7 12-17' fill='none' stroke='%2331d1c0' stroke-width='6' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='46' cy='16' r='5' fill='%23ff8a5b'/%3E%3C/svg%3E"
    />
    <script src="./theme.js"></script>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./themes.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">LMArena Visual Analytics</p>
          <h1>LM Arena 榜单演化与机构格局</h1>
        </div>
        <div class="topbar-right">
          <div class="theme-switcher" role="group" aria-label="视觉主题">
            <button type="button" data-theme-option="current-polished" title="Current Polished">Polished</button>
            <button type="button" data-theme-option="research-lab" title="Research Lab">Research</button>
            <button type="button" data-theme-option="terminal-analytics" title="Terminal Analytics">Terminal</button>
          </div>
          <div class="search-box">
            <input
              id="modelSearch"
              type="search"
              autocomplete="off"
              placeholder="搜索模型或机构"
              aria-label="搜索模型或机构"
            />
            <div id="searchResults" class="search-results" hidden></div>
          </div>
          <div id="dataStatus" class="status-pill">正在加载数据</div>
        </div>
      </header>

      <main>
        <section class="filter-dock" aria-label="全局筛选">
          <div class="filter-field">
            <span class="filter-label">Arena</span>
            <button id="arenaTrigger" class="filter-trigger" type="button" aria-haspopup="listbox" aria-expanded="false">
              <span class="filter-value">text</span>
              <i aria-hidden="true"></i>
            </button>
            <div id="arenaMenu" class="filter-menu arena-menu" role="listbox" hidden></div>
            <select id="arenaSelect" class="native-control" tabindex="-1" aria-hidden="true"></select>
          </div>
          <div class="filter-field">
            <span class="filter-label">Category</span>
            <button id="categoryTrigger" class="filter-trigger" type="button" aria-haspopup="listbox" aria-expanded="false">
              <span class="filter-value">overall</span>
              <i aria-hidden="true"></i>
            </button>
            <div id="categoryMenu" class="filter-menu" role="listbox" hidden></div>
            <select id="categorySelect" class="native-control" tabindex="-1" aria-hidden="true"></select>
          </div>
          <div class="filter-field">
            <span class="filter-label">Organization</span>
            <button id="organizationTrigger" class="filter-trigger" type="button" aria-haspopup="listbox" aria-expanded="false">
              <span class="filter-value">全部机构</span>
              <i aria-hidden="true"></i>
            </button>
            <div id="organizationMenu" class="filter-menu" role="listbox" hidden></div>
            <select id="organizationSelect" class="native-control" tabindex="-1" aria-hidden="true"></select>
          </div>
          <div class="filter-field rank-filter">
            <span class="filter-label">Rank Top</span>
            <div id="rankChoices" class="rank-choices" role="group" aria-label="榜单显示数量">
              <button type="button" data-rank="10">10</button>
              <button type="button" data-rank="15">15</button>
              <button type="button" data-rank="20">20</button>
              <button type="button" data-rank="30">30</button>
            </div>
            <input id="rankLimit" class="native-control" type="number" min="5" max="50" step="1" tabindex="-1" aria-hidden="true" />
          </div>
        </section>

        <nav class="analysis-modes" aria-label="分析任务">
          <button class="is-active" type="button" data-analysis-mode="reliability" aria-pressed="true">
            <strong>排名可信度</strong><span>比较评分与不确定性</span>
          </button>
          <button type="button" data-analysis-mode="evolution" aria-pressed="false">
            <strong>排名演化</strong><span>追踪更替与活跃变化</span>
          </button>
          <button type="button" data-analysis-mode="ecosystem" aria-pressed="false">
            <strong>机构格局</strong><span>观察能力与覆盖边界</span>
          </button>
        </nav>

        <div id="contextBar" class="context-bar" hidden></div>

        <section class="analysis-prompt" aria-label="分析入口">
          <span>当前分析问题</span>
          <strong id="analysisPrompt">当前领先是否可靠？不同任务下排名是否一致？</strong>
        </section>

        <section class="spotlight" aria-label="摘要视图" data-analysis-view="reliability">
          <div id="hero" class="hero">
            <article class="hero-headline">
              <span id="heroKicker" class="hero-kicker"></span>
              <div id="heroChampion" class="hero-champion"></div>
              <div id="heroMeta" class="hero-meta"></div>
            </article>
            <article class="hero-podium">
              <div class="podium-title">
                <span>Top 3 Podium</span>
                <span id="podiumNote"></span>
              </div>
              <div id="podiumStage" class="podium-stage"></div>
            </article>
          </div>

          <section id="kpiGrid" class="kpi-grid" aria-label="关键指标"></section>
        </section>

        <section class="bento" aria-label="多视图分析">
          <article class="panel tile t-leaderboard" data-analysis-view="reliability">
            <div class="panel-head">
              <h2 data-title-key="leaderboard">当前榜单与置信区间</h2>
              <span id="leaderboardNote"></span>
            </div>
            <div class="chart-legend uncertainty-legend" aria-label="评分图图例">
              <span><i class="legend-interval"></i>95% 评分区间</span>
              <span><i class="legend-votes"></i>气泡大小 = 票数</span>
              <span><i class="legend-overlap"></i>区间重叠 = 名次未必可区分</span>
            </div>
            <div class="chart-wrap extra-tall">
              <svg id="leaderboardChart" role="img" aria-label="当前榜单评分图"></svg>
            </div>
          </article>

          <article class="panel tile t-history" data-analysis-view="evolution">
            <div class="panel-head">
              <h2 data-title-key="history">排名历史</h2>
              <div class="panel-head-actions">
                <span id="evolutionNote"></span>
                <div class="segmented" aria-label="排名历史视图模式">
                  <button id="evolutionModeButton" class="is-active" type="button">趋势分析</button>
                  <button id="raceModeButton" type="button">竞速播放</button>
                </div>
              </div>
            </div>
            <div id="evolutionMode" class="rank-mode-panel">
              <div class="chart-wrap extra-tall">
                <svg id="evolutionChart" role="img" aria-label="排名演化折线图"></svg>
              </div>
            </div>
            <div id="raceMode" class="rank-mode-panel" hidden>
              <div class="race-controls">
                <button id="racePlay" class="race-play" type="button">播放</button>
                <input
                  id="raceScrub"
                  class="race-scrub"
                  type="range"
                  min="0"
                  max="0"
                  value="0"
                  aria-label="竞速时间轴"
                />
                <label class="race-speed">
                  <span>Speed</span>
                  <select id="raceSpeed">
                    <option value="1">1x</option>
                    <option value="2" selected>2x</option>
                    <option value="4">4x</option>
                  </select>
                </label>
                <span id="raceDate"></span>
              </div>
              <div class="chart-wrap extra-tall">
                <p id="raceWatermark" class="race-watermark" aria-hidden="true"></p>
                <svg id="raceChart" role="img" aria-label="排名竞速图"></svg>
              </div>
            </div>
          </article>

          <article class="panel tile t-timeline" data-analysis-view="evolution">
            <div class="panel-head">
              <h2 data-title-key="activity">活跃时间轴</h2>
              <div class="panel-head-actions">
                <span id="timelineNote"></span>
                <div class="segmented compact" aria-label="活跃度统计尺度">
                  <button type="button" data-activity-metric="cumulative">累计</button>
                  <button class="is-active" type="button" data-activity-metric="monthly">月新增</button>
                  <button type="button" data-activity-metric="growth">增长率</button>
                </div>
              </div>
            </div>
            <div class="chart-wrap tall">
              <svg id="timelineChart" role="img" aria-label="各 Arena 投票活跃度时间轴"></svg>
            </div>
          </article>

          <article class="panel tile t-scatter" data-analysis-view="ecosystem">
            <div class="panel-head">
              <h2 data-title-key="organization-matrix">机构能力—覆盖矩阵</h2>
              <span id="orgScatterNote"></span>
            </div>
            <div class="chart-wrap">
              <svg id="orgScatter" role="img" aria-label="机构模型覆盖与Top-3能力百分位矩阵"></svg>
            </div>
          </article>

          <article class="panel tile t-orgbars" data-analysis-view="ecosystem">
            <div class="panel-head">
              <h2 data-title-key="organization-coverage">机构模型覆盖</h2>
              <span id="orgBarsNote"></span>
            </div>
            <div class="chart-wrap">
              <svg id="orgBars" role="img" aria-label="机构模型覆盖柱状图"></svg>
            </div>
          </article>

          <article class="panel tile t-arena" data-analysis-view="ecosystem">
            <div class="panel-head">
              <h2 data-title-key="arena-scale">Arena 规模</h2>
              <span id="arenaScaleNote"></span>
            </div>
            <div class="chart-wrap">
              <svg id="arenaBars" role="img" aria-label="Arena 模型规模对比"></svg>
            </div>
          </article>

          <article class="panel tile t-table" data-analysis-view="reliability">
            <div class="panel-head">
              <h2 data-title-key="table">榜单明细</h2>
              <span id="tableNote"></span>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Rank</th>
                    <th>Model</th>
                    <th>Organization</th>
                    <th>Rating</th>
                    <th>Interval</th>
                    <th>Votes</th>
                  </tr>
                </thead>
                <tbody id="leaderboardTable"></tbody>
              </table>
            </div>
          </article>
        </section>
      </main>
    </div>

    <div id="tooltip" class="tooltip" role="status" aria-live="polite"></div>
    <div id="drawerOverlay" class="drawer-overlay" hidden></div>
    <aside id="detailDrawer" class="drawer" aria-hidden="true" aria-label="详情面板">
      <div class="drawer-head">
        <span id="drawerKicker" class="drawer-kicker">详情</span>
        <button id="drawerClose" class="drawer-close" type="button" aria-label="关闭详情">×</button>
      </div>
      <div id="drawerBody" class="drawer-body"></div>
    </aside>

    <script src="./app.js"></script>
  </body>
</html>
